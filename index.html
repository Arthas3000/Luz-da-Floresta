<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luz da Floresta | Oráculo de Cristais</title>
    
    <!-- CSS Externo -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- TensorFlow.js & Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body class="antialiased pb-20">

    <!-- Container do WebApp -->
    <main class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#121815]">
        
        <!-- Header -->
        <header class="p-5 border-b border-gray-800 sticky top-0 z-40 bg-[#121815]/90 backdrop-blur-md text-center">
            <h1 class="text-2xl font-bold text-emerald-400 text-glow font-serif">Luz da Floresta</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Oráculo de Cristais</p>
        </header>

        <!-- ABA: ESCANEAR CÂMERA -->
        <div id="view-escanear" class="tab-content p-5 flex flex-col items-center">
            <p class="text-sm text-gray-400 text-center mb-6">Aponte a câmera para o cristal e descubra sua essência mágica.</p>
            
            <div id="camera-container" class="w-full aspect-[3/4] bg-[#1e2621] rounded-2xl overflow-hidden relative border border-gray-700 flex flex-col items-center justify-center">
                <i data-lucide="scan-line" class="w-12 h-12 text-gray-600 absolute"></i>
                <div id="webcam-wrapper" class="absolute inset-0 z-10 hidden"></div>
                
                <!-- Animação de Carregamento (Magia 2 segundos) -->
                <div id="loading-magic" class="absolute inset-0 z-20 hidden flex-col items-center justify-center bg-[#121815]/90 backdrop-blur-sm">
                    <div class="magic-loader mb-4"></div>
                    <p class="text-emerald-400 font-medium animate-pulse">Lendo energias...</p>
                </div>
            </div>

            <button id="btn-camera" class="mt-8 w-full py-4 rounded-xl bg-gradient-to-r from-emerald-600 to-teal-700 text-white font-bold text-lg shadow-[0_0_15px_rgba(16,185,129,0.3)] flex items-center justify-center gap-2 transform active:scale-95 transition-transform">
                <i data-lucide="camera"></i> Abrir Oráculo
            </button>
            <p id="feedback-text" class="mt-4 text-sm text-center text-gray-400"></p>
        </div>

        <!-- ABA: PESQUISAR -->
        <div id="view-pesquisar" class="tab-content hidden p-5">
            <div class="relative mb-6">
                <i data-lucide="search" class="absolute left-4 top-4 w-5 h-5 text-gray-500"></i>
                <input type="text" id="search-input" placeholder="Buscar cristal ou energia..." class="w-full pl-12 pr-4 py-3.5 rounded-xl bg-[#1e2621] border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white outline-none placeholder-gray-500">
            </div>
            <div id="search-results" class="space-y-3 pb-6"></div>
        </div>

        <!-- ABA: SIGNOS -->
        <div id="view-signos" class="tab-content hidden p-5">
            <p class="text-sm text-gray-400 mb-4">Qual é o seu signo solar ou ascendente?</p>
            <div id="signos-grid" class="grid grid-cols-3 gap-3 mb-8"></div>
            <div id="signos-results" class="space-y-3 pb-6"></div>
        </div>

        <!-- ABA: CATÁLOGO -->
        <div id="view-catalogo" class="tab-content hidden p-5">
            <div id="catalogo-results" class="grid grid-cols-2 gap-4 pb-6"></div>
        </div>

        <!-- MODAL: CARTA DO CRISTAL (O TAROT) -->
        <div id="modal-card" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm opacity-0 transition-opacity duration-300">
            <div class="tarot-card relative w-full max-w-[360px] max-h-[90vh] rounded-2xl overflow-y-auto no-scrollbar flex flex-col">
                <button id="close-modal" class="absolute top-4 right-4 p-2 bg-black/40 rounded-full text-white z-10 backdrop-blur-md">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div id="modal-content"></div>
            </div>
        </div>

        <!-- NAVEGAÇÃO INFERIOR -->
        <nav class="fixed bottom-0 w-full max-w-md bg-[#121815]/95 backdrop-blur-lg border-t border-gray-800 flex justify-between px-2 py-3 z-40">
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 text-emerald-500" data-target="view-escanear">
                <i data-lucide="scan" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Escanear</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 text-gray-500" data-target="view-pesquisar">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Buscar</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 text-gray-500" data-target="view-signos">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Signos</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 text-gray-500" data-target="view-catalogo">
                <i data-lucide="book-open" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Catálogo</span>
            </button>
        </nav>
    </main>

    <script src="app.js"></script>
</body>
</html>
