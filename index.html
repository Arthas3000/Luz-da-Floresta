<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luz da Floresta | Oráculo e Guia</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FDFBF7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased overflow-hidden">

    <main class="w-full h-[100dvh] flex flex-col relative sm:max-w-md sm:mx-auto sm:border-x sm:border-gray-200" style="background-color: var(--bg-color);">
        
        <!-- [HTML_01_HEADER] -->
        <header class="p-5 flex justify-center items-center z-30 mystic-border pb-4" style="background-color: var(--bg-color);">
            <div class="text-center flex flex-col items-center">
                <i data-lucide="moon" class="w-4 h-4 mb-1" style="color: var(--gold);"></i>
                <h1 class="text-2xl font-serif font-bold tracking-tight" style="color: var(--text-main);">Luz da Floresta</h1>
                <p class="text-[10px] uppercase tracking-widest font-bold" style="color: var(--accent-green);">Terapias Holísticas</p>
            </div>
        </header>

        <!-- [HTML_02_CONTAINER_ABAS] -->
        <div class="flex-1 overflow-y-auto no-scrollbar relative pb-20">
            
            <!-- ABA 1: ORÁCULO E QUIZ -->
            <div id="view-oraculo" class="tab-content h-full flex flex-col items-center justify-start pt-6 p-5 fade-in">
                
                <button id="btn-iniciar-quiz" class="w-full p-4 mb-8 rounded-xl shadow-sm border transform active:scale-95 transition-all flex items-center justify-between" style="background-color: var(--card-bg); border-color: var(--gold);">
                    <div class="text-left flex-1">
                        <h3 class="font-bold text-sm" style="color: var(--text-main);">Como você está se sentindo?</h3>
                        <p class="text-xs mt-1" style="color: var(--text-muted);">Faça o teste e descubra seu ritual para hoje.</p>
                    </div>
                    <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background-color: rgba(192, 160, 98, 0.2);">
                        <i data-lucide="sparkles" class="w-5 h-5" style="color: var(--gold);"></i>
                    </div>
                </button>

                <div class="w-full flex items-center gap-4 mb-12 opacity-60">
                    <div class="flex-1 h-px bg-gradient-to-r from-transparent to-[#C0A062]"></div>
                    <span class="text-xs uppercase tracking-widest font-bold" style="color: var(--gold);">O Oráculo</span>
                    <div class="flex-1 h-px bg-gradient-to-l from-transparent to-[#C0A062]"></div>
                </div>

                <!-- [HTML_03_TAROT] Componente Carta Gigante -->
                <div class="tarot-overlay" id="tarot-overlay"></div>

                <div class="tarot-scene" id="tarot-scene">
                    <div class="tarot-card" id="tarot-card">
                        
                        <!-- Face Mística (Verso visível ao abrir o app) -->
                        <div class="tarot-face tarot-front relative">
                            <div class="absolute inset-2 border border-[#C0A062] rounded-lg opacity-80"></div>
                            <div class="absolute inset-3 border border-[#C0A062] rounded border-dashed opacity-50"></div>
                            <svg class="absolute w-full h-full p-4 text-[#C0A062] opacity-80" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="50" cy="75" r="30" fill="none" stroke="currentColor" stroke-width="1.5"/>
                                <circle cx="50" cy="75" r="25" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2,2"/>
                                <path d="M50 55 A 20 20 0 1 0 70 75 A 15 15 0 1 1 50 55" fill="currentColor"/>
                                <polygon points="50,15 53,25 63,28 53,31 50,41 47,31 37,28 47,25" fill="currentColor"/>
                                <polygon points="50,135 53,125 63,122 53,119 50,109 47,119 37,122 47,125" fill="currentColor"/>
                            </svg>
                        </div>

                        <!-- Face do Cristal (Injetada via JS) -->
                        <div class="tarot-face tarot-back no-scrollbar" id="tarot-back-content"></div>

                    </div>
                </div>
                
                <p class="text-xs text-center mt-6" style="color: var(--text-muted); z-index: 5;">Toque na carta para revelar seu guia diário.</p>
            </div>

            <!-- ABA 2: EXPLORAR -->
            <div id="view-explorar" class="tab-content hidden p-5 fade-in min-h-full">
                <div class="mb-6">
                    <h2 class="text-lg font-serif font-bold mb-3" style="color: var(--text-main);">Descubra o que você precisa</h2>
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5" style="color: var(--text-muted);"></i>
                        <input type="text" id="search-input" placeholder="Ex: foco, dor de cabeça, proteção..." class="w-full pl-12 pr-4 py-3 rounded-xl outline-none" style="background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main);">
                    </div>
                </div>

                <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-4">
                    <button class="filter-btn px-4 py-1.5 text-xs font-bold rounded-full border transition-colors flex-shrink-0 active-filter" data-filter="todos" style="border-color: var(--accent-green); background-color: var(--accent-green); color: white;">Todos</button>
                    <button class="filter-btn px-4 py-1.5 text-xs font-bold rounded-full border transition-colors flex-shrink-0" data-filter="cristal" style="border-color: var(--border-color); color: var(--text-muted);">Cristais</button>
                    <button class="filter-btn px-4 py-1.5 text-xs font-bold rounded-full border transition-colors flex-shrink-0" data-filter="incenso" style="border-color: var(--border-color); color: var(--text-muted);">Incensos</button>
                </div>

                <div id="explorar-results" class="grid grid-cols-2 gap-4 pb-6"></div>
            </div>

            <!-- ABA 3: MEU ALTAR -->
            <div id="view-altar" class="tab-content hidden p-5 fade-in min-h-full">
                <h2 class="text-lg font-serif font-bold mb-4 text-center" style="color: var(--text-main);">Seu Espaço Sagrado</h2>
                <div class="flex p-1 rounded-xl mb-6" style="background-color: rgba(230, 224, 212, 0.5);">
                    <button id="btn-colecao" class="flex-1 py-2.5 text-sm font-bold rounded-lg shadow-sm bg-white transition-all" style="color: var(--text-main);">Minha Coleção</button>
                    <button id="btn-desejos" class="flex-1 py-2.5 text-sm font-bold rounded-lg opacity-60 transition-all" style="color: var(--text-main);">Desejos</button>
                </div>
                <div id="altar-results" class="grid grid-cols-2 gap-4 pb-6"></div>
            </div>

        </div>

        <!-- [HTML_04_NAVEGACAO] -->
        <nav class="absolute bottom-0 w-full flex justify-around px-2 py-3 z-30 border-t bg-opacity-95 backdrop-blur-md" style="background-color: var(--bg-color); border-color: var(--border-color);">
            <button class="nav-btn flex flex-col items-center gap-1 w-20 active-tab" data-target="view-oraculo">
                <i data-lucide="compass" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Oráculo</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 w-20 opacity-50" data-target="view-explorar">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Explorar</span>
            </button>
            <button class="nav-btn flex flex-col items-center gap-1 w-20 opacity-50" data-target="view-altar">
                <i data-lucide="heart" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Meu Altar</span>
            </button>
        </nav>

        <!-- ================= [MODAIS DO SISTEMA] ================= -->
        
        <!-- Modal Padrão (Busca/Altar/Quiz Ver Mais) -> Sobrepõe tudo z-60 -->
        <div id="modal-item" class="fixed inset-0 z-[60] hidden flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm opacity-0 transition-opacity duration-300">
            <div id="item-container" class="crystal-card relative w-full sm:max-w-[380px] max-h-[90vh] h-[85vh] sm:h-auto sm:rounded-2xl rounded-t-3xl overflow-y-auto no-scrollbar flex flex-col translate-y-full transition-transform duration-300">
                <button id="close-item" class="absolute top-4 right-4 p-2 bg-black/30 rounded-full text-white z-10 hover:bg-black/50 backdrop-blur-md">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div id="item-content" class="pb-8"></div>
            </div>
        </div>

        <!-- Modal Quiz -> z-50 -->
        <div id="modal-quiz" class="fixed inset-0 z-[50] hidden flex flex-col bg-white overflow-hidden opacity-0 transition-opacity duration-300" style="background-color: var(--bg-color);">
            <header class="p-5 flex justify-between items-center border-b border-gray-200">
                <span class="text-xs font-bold tracking-widest uppercase" style="color: var(--gold);">Descubra Sua Energia</span>
                <button id="close-quiz"><i data-lucide="x" class="w-6 h-6" style="color: var(--text-main);"></i></button>
            </header>
            <div class="w-full h-1 bg-gray-200"><div id="quiz-progress" class="h-full bg-green-800 transition-all duration-300" style="background-color: var(--accent-green); width: 0%;"></div></div>
            <div class="flex-1 overflow-y-auto p-6 flex flex-col justify-center relative">
                <div id="quiz-content" class="w-full max-w-sm mx-auto"></div>
            </div>
        </div>

    </main>
    <script src="app.js"></script>
</body>
</html>
