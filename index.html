<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luz da Floresta | Guia de Cristais</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1A17" media="(prefers-color-scheme: dark)">
    
    <!-- Otimizações para iOS (Apple) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Luz Floresta">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <!-- Arquivos Externos -->
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased overflow-hidden">

    <main class="max-w-md mx-auto h-[100dvh] flex flex-col relative shadow-2xl transition-colors" style="background-color: var(--bg-color);">
        
        <!-- HEADER -->
        <header class="p-4 flex justify-between items-center border-b z-40" style="border-color: var(--border-color); background-color: var(--bg-color);">
            <div>
                <h1 class="text-2xl font-serif font-bold tracking-tight" style="color: var(--text-main);">Luz da Floresta</h1>
                <p class="text-[10px] uppercase tracking-widest font-bold" style="color: var(--accent-green);">Guia de Cristais</p>
            </div>
            <button id="theme-toggle" class="p-2 rounded-full focus:outline-none" style="background-color: var(--card-bg); border: 1px solid var(--border-color);">
                <i data-lucide="moon" class="dark:hidden w-5 h-5" style="color: var(--text-main);"></i>
                <i data-lucide="sun" class="hidden dark:block w-5 h-5 text-yellow-500"></i>
            </button>
        </header>

        <!-- ÁREA DE CONTEÚDO -->
        <div class="flex-1 overflow-y-auto no-scrollbar relative pb-20">
            
            <!-- ABA: GUIA DIÁRIO -->
            <div id="view-descobrir" class="tab-content h-full flex flex-col items-center justify-center p-6 fade-in">
                <div class="text-center mb-8">
                    <i data-lucide="leaf" class="w-12 h-12 mx-auto mb-4" style="color: var(--accent-green);"></i>
                    <h2 class="text-xl font-bold mb-2">Qual energia você precisa hoje?</h2>
                    <p class="text-sm text-center" style="color: var(--text-muted);">Sorteie uma pedra mágica para ser o seu guia energético.</p>
                </div>
                
                <button id="btn-sortear" class="w-full py-4 rounded-xl text-white font-bold text-lg shadow-lg transform active:scale-95 transition-transform flex items-center justify-center gap-2" style="background-color: var(--accent-green);">
                    <i data-lucide="sparkles"></i> Revelar Meu Cristal
                </button>
            </div>

            <!-- ABA: FILTROS E BUSCA (Agrupa Busca, Signos e Chakras) -->
            <div id="view-explorar" class="tab-content hidden p-5 fade-in min-h-full">
                <!-- Busca -->
                <div class="relative mb-6">
                    <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5" style="color: var(--text-muted);"></i>
                    <input type="text" id="search-input" placeholder="Buscar cristal..." class="w-full pl-12 pr-4 py-3 rounded-xl outline-none" style="background-color: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main);">
                </div>

                <!-- Abas Internas (Signos / Chakras) -->
                <div class="flex gap-2 mb-4">
                    <button id="tab-signos" class="flex-1 py-2 text-sm font-bold rounded-lg border active-filter" style="border-color: var(--accent-green); color: var(--accent-green);">Signos</button>
                    <button id="tab-chakras" class="flex-1 py-2 text-sm font-bold rounded-lg border opacity-50" style="border-color: var(--border-color); color: var(--text-muted);">Chakras</button>
                </div>

                <div id="signos-container">
                    <div id="signos-grid" class="grid grid-cols-3 gap-2 mb-6"></div>
                </div>
                <div id="chakras-container" class="hidden">
                    <div id="chakras-grid" class="grid grid-cols-2 gap-2 mb-6"></div>
                </div>

                <div id="explorar-results" class="space-y-3 pb-6 border-t pt-4" style="border-color: var(--border-color);"></div>
            </div>

            <!-- ABA: MEU ALTAR -->
            <div id="view-altar" class="tab-content hidden p-5 fade-in min-h-full">
                <div class="flex bg-gray-200 dark:bg-gray-800 p-1 rounded-xl mb-6" style="background-color: var(--border-color);">
                    <button id="btn-colecao" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white dark:bg-gray-900 shadow-sm" style="color: var(--text-main);">Minha Coleção</button>
                    <button id="btn-desejos" class="flex-1 py-2 text-sm font-bold rounded-lg opacity-60" style="color: var(--text-main);">Desejos</button>
                </div>
                <div id="altar-results" class="grid grid-cols-2 gap-4 pb-6"></div>
            </div>

            <!-- ABA: CATÁLOGO -->
            <div id="view-catalogo" class="tab-content hidden p-5 fade-in min-h-full">
                <div id="catalogo-results" class="grid grid-cols-2 gap-4 pb-6"></div>
            </div>

        </div>

        <!-- NAVEGAÇÃO INFERIOR -->
        <nav class="absolute bottom-0 w-full flex justify-between px-2 py-3 z-40 border-t" style="background-color: var(--bg-color); border-color: var(--border-color);">
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 active-tab" data-target="view-descobrir">
                <i data-lucide="compass" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Guia</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 opacity-50" data-target="view-explorar">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Explorar</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 opacity-50" data-target="view-altar">
                <i data-lucide="heart" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Altar</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center gap-1 opacity-50" data-target="view-catalogo">
                <i data-lucide="library" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase font-bold tracking-wider">Catálogo</span>
            </button>
        </nav>

        <!-- MODAL DO CRISTAL -->
        <div id="modal-card" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/70 backdrop-blur-sm opacity-0 transition-opacity duration-300">
            <div id="card-container" class="crystal-card relative w-full max-w-[360px] max-h-[90vh] rounded-2xl overflow-y-auto no-scrollbar flex flex-col opacity-0">
                <button id="close-modal" class="absolute top-3 right-3 p-2 bg-black/40 rounded-full text-white z-10 hover:bg-black/60 backdrop-blur-md">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
                <div id="modal-content"></div>
            </div>
        </div>

    </main>
    <script src="app.js"></script>
</body>
</html>
